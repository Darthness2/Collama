name: release

# Triggered by pushing a tag like `v0.2.0`. Publishes the built wheel +
# sdist to PyPI using PyPI Trusted Publishing — no API token stored in
# the repo. You must configure this once on PyPI:
#
#   1. Create the project on PyPI (or use an existing one).
#   2. Settings → Publishing → Add a new publisher:
#        owner:        YOUR_USERNAME
#        repository:   Collama
#        workflow:     release.yml
#        environment:  pypi
#   3. Create a protected GitHub environment named `pypi` on this repo so
#      tag pushes go through a manual review before publishing.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build "twine>=6.0"

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify metadata
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publishing
    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
